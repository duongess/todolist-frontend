<div class="max-w-2xl mx-auto p-6 bg-white rounded-lg shadow-md mt-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Thêm mới công việc</h1>
  
  <form [formGroup]="newForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tiêu đề</label>
      <input type="text" formControlName="title" 
             class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-xs focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
    </div>
    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nội dung</label>
      <textarea formControlName="content" rows="5" 
                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-xs focus:outline-hidden focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"></textarea>
    </div>
    
    <div class="flex items-center justify-end space-x-3 pt-2">
      <button type="button" [routerLink]="['/list']" 
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-xs hover:bg-gray-50 transition-colors">
        Hủy
      </button>
      <button type="submit" 
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md shadow-xs hover:bg-blue-700 focus:outline-hidden focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
        Lưu công việc
      </button>
    </div>
  </form>
</div>
